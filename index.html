<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 반 활동 기록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #faf9f6;
    --primary: #2d6a4f;
    --primary-light: #52b788;
    --primary-pale: #d8f3dc;
    --accent: #e76f51;
    --text: #1a1a1a;
    --text2: #555;
    --text3: #999;
    --border: #e0ddd6;
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── 공통 ── */
  .hidden { display: none !important; }
  .page { display: none; min-height: 100vh; }
  .page.active { display: block; }

  button {
    cursor: pointer;
    border: none;
    font-family: inherit;
    font-size: 14px;
    transition: all 0.18s;
  }
  input, textarea, select {
    font-family: inherit;
    font-size: 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    width: 100%;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.18s;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--primary-light);
  }
  textarea { resize: vertical; min-height: 100px; }
  label { font-size: 13px; color: var(--text2); font-weight: 500; display: block; margin-bottom: 5px; }

  .btn-primary {
    background: var(--primary);
    color: #fff;
    padding: 12px 28px;
    border-radius: var(--radius-sm);
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .btn-primary:hover { background: #235c43; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-outline {
    background: transparent;
    color: var(--primary);
    border: 1.5px solid var(--primary);
    padding: 9px 20px;
    border-radius: var(--radius-sm);
    font-weight: 500;
  }
  .btn-outline:hover { background: var(--primary-pale); }

  .btn-accent {
    background: var(--accent);
    color: #fff;
    padding: 10px 22px;
    border-radius: var(--radius-sm);
    font-weight: 500;
  }
  .btn-accent:hover { background: #cf5c3d; }

  .btn-sm {
    padding: 7px 14px;
    font-size: 13px;
    border-radius: 6px;
  }

  .chip {
    display: inline-block;
    background: var(--primary-pale);
    color: var(--primary);
    font-size: 12px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .chip.orange { background: #fde8e0; color: #c0522b; }
  .chip.gray { background: #efefef; color: #666; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a;
    color: #fff;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    z-index: 9999;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(245,243,238,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 8888;
    flex-direction: column;
    gap: 14px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p { color: var(--text2); font-size: 14px; }

  /* ── 로그인 화면 ── */
  #page-login {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .login-card {
    background: var(--surface);
    border-radius: 24px;
    padding: 52px 44px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--shadow);
    text-align: center;
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .login-icon {
    width: 64px; height: 64px;
    background: var(--primary-pale);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 30px;
  }
  .login-card h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 6px;
  }
  .login-card .subtitle {
    font-size: 13px;
    color: var(--text3);
    margin-bottom: 36px;
  }
  .code-input-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .code-input-wrap input {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    padding: 14px;
  }
  .login-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0;
    color: var(--text3);
    font-size: 12px;
  }
  .login-divider::before, .login-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── 상단 네비 ── */
  .nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--primary);
    font-weight: 400;
  }
  .nav-user {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--text2);
  }
  .nav-user strong { color: var(--text); }
  .btn-logout {
    background: none;
    color: var(--text3);
    font-size: 12px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .btn-logout:hover { color: var(--text); border-color: var(--text3); }

  /* ── 탭 ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 16px 24px 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tab-btn {
    background: none;
    color: var(--text3);
    padding: 10px 18px;
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    font-size: 14px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab-btn.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
    background: var(--bg);
  }
  .tab-btn:hover:not(.active) { color: var(--text2); }

  /* ── 컨텐츠 영역 ── */
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  /* ── 섹션 헤더 ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-header h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  /* ── 카드 ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    border: 1px solid var(--border);
    transition: box-shadow 0.18s;
  }
  .card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.1); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .card-meta {
    font-size: 12px;
    color: var(--text3);
    margin-top: 3px;
  }
  .card-body {
    font-size: 14px;
    color: var(--text2);
    white-space: pre-wrap;
    line-height: 1.7;
  }

  /* ── 피드백 박스 ── */
  .feedback-box {
    background: #fffbf0;
    border: 1.5px solid #f0d58c;
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-top: 14px;
  }
  .feedback-box .fb-label {
    font-size: 12px;
    font-weight: 700;
    color: #b07d00;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .feedback-box .fb-content {
    font-size: 14px;
    color: #5a4000;
    white-space: pre-wrap;
    line-height: 1.7;
  }
  .no-feedback {
    font-size: 13px;
    color: var(--text3);
    margin-top: 10px;
    font-style: italic;
  }

  /* ── 과제 선택 ── */
  .assignment-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 10px;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .assignment-card:hover { border-color: var(--primary-light); background: var(--surface2); }
  .assignment-card.selected { border-color: var(--primary); background: var(--primary-pale); }
  .assignment-card .a-num {
    width: 40px; height: 40px;
    background: var(--primary-pale);
    color: var(--primary);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 15px;
    flex-shrink: 0;
  }
  .assignment-card.selected .a-num { background: var(--primary); color: #fff; }
  .assignment-card .a-info { flex: 1; }
  .assignment-card .a-title { font-weight: 700; font-size: 15px; }
  .assignment-card .a-desc { font-size: 13px; color: var(--text3); margin-top: 2px; }
  .assignment-card .a-due { font-size: 12px; color: var(--accent); font-weight: 500; }

  /* ── 제출 폼 ── */
  .submit-form {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 26px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    margin-top: 20px;
  }
  .submit-form h3 { font-size: 16px; margin-bottom: 16px; }
  .form-group { margin-bottom: 16px; }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }
  .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 6px; }

  /* ── 교사 필터 ── */
  .filter-bar {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .filter-bar .form-group { flex: 1; min-width: 140px; margin: 0; }
  .filter-bar label { margin-bottom: 5px; }

  /* ── 제출물 카드 (교사) ── */
  .sub-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 22px 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    margin-bottom: 14px;
  }
  .sub-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .sub-student { font-weight: 700; font-size: 15px; }
  .sub-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .sub-content {
    font-size: 14px;
    color: var(--text2);
    white-space: pre-wrap;
    line-height: 1.7;
    background: var(--surface2);
    padding: 14px;
    border-radius: var(--radius-sm);
    margin-bottom: 14px;
  }
  .feedback-input-area textarea { min-height: 80px; }
  .feedback-saved {
    background: #f0fdf4;
    border: 1.5px solid #86efac;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 14px;
    color: #166534;
    white-space: pre-wrap;
    margin-bottom: 10px;
    line-height: 1.7;
  }

  /* ── 학생 관리 ── */
  .student-table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th {
    text-align: left;
    padding: 10px 14px;
    background: var(--surface2);
    color: var(--text2);
    font-size: 12px;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  .code-badge {
    font-family: monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    background: var(--primary-pale);
    padding: 3px 10px;
    border-radius: 6px;
    letter-spacing: 2px;
  }

  /* ── 빈 상태 ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-state .icon { font-size: 44px; margin-bottom: 14px; }
  .empty-state p { font-size: 15px; }

  /* ── 반응형 ── */
  @media (max-width: 600px) {
    .login-card { padding: 36px 24px; }
    .container { padding: 18px 14px; }
    .nav { padding: 0 14px; }
    .tabs { padding: 14px 14px 0; overflow-x: auto; }
    .filter-bar { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- 로딩 오버레이 -->
<div class="loading-overlay hidden" id="loading">
  <div class="spinner"></div>
  <p id="loading-text">불러오는 중...</p>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════
     로그인 화면
══════════════════════════════════════ -->
<div class="page active" id="page-login" style="display:flex;">
  <div class="login-card">
    <div class="login-icon">📚</div>
    <h1>우리 반 활동 기록</h1>
    <p class="subtitle">개인 코드를 입력하고 접속하세요</p>

    <div class="form-group">
      <div class="code-input-wrap">
        <input type="text" id="student-code" maxlength="6" placeholder="예: A3K9M2"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter')loginStudent()">
      </div>
      <button class="btn-primary" style="width:100%" onclick="loginStudent()">학생으로 접속</button>
    </div>

    <div class="login-divider">교사</div>

    <div class="form-group" style="margin-bottom:10px">
      <input type="password" id="teacher-pw" placeholder="교사 비밀번호"
        onkeydown="if(event.key==='Enter')loginTeacher()">
    </div>
    <button class="btn-outline" style="width:100%" onclick="loginTeacher()">교사로 접속</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     학생 화면
══════════════════════════════════════ -->
<div class="page" id="page-student">
  <nav class="nav">
    <span class="nav-brand">📚 활동 기록</span>
    <div class="nav-user">
      <span><strong id="s-name"></strong> (<span id="s-class"></span>)</span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </nav>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('s','submit')">과제 제출</button>
    <button class="tab-btn" onclick="switchTab('s','my')">내 제출물·피드백</button>
  </div>

  <!-- 과제 제출 탭 -->
  <div id="s-tab-submit" class="container">
    <div class="section-header">
      <h2>과제 선택</h2>
    </div>
    <div id="assignment-list">
      <div class="empty-state"><div class="icon">📋</div><p>과제를 불러오는 중...</p></div>
    </div>

    <div class="submit-form hidden" id="submit-form">
      <h3 id="submit-form-title">과제 제출</h3>
      <div class="form-group">
        <label>활동 내용 *</label>
        <textarea id="sub-content" placeholder="이번 수업에서 한 활동, 느낀 점, 배운 점 등을 자유롭게 적어주세요."></textarea>
      </div>
      <div class="form-group">
        <label>파일 링크 (선택) — Google Drive 공유 링크</label>
        <input type="url" id="sub-file" placeholder="https://drive.google.com/...">
      </div>
      <div class="form-actions">
        <button class="btn-outline" onclick="cancelSubmit()">취소</button>
        <button class="btn-primary" onclick="submitAssignment()">제출하기</button>
      </div>
    </div>
  </div>

  <!-- 내 제출물 탭 -->
  <div id="s-tab-my" class="container hidden">
    <div class="section-header">
      <h2>내 제출물 · 피드백</h2>
      <button class="btn-outline btn-sm" onclick="loadMySubmissions()">새로고침</button>
    </div>
    <div id="my-submissions-list">
      <div class="empty-state"><div class="icon">📝</div><p>불러오는 중...</p></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     교사 화면
══════════════════════════════════════ -->
<div class="page" id="page-teacher">
  <nav class="nav">
    <span class="nav-brand">📚 활동 기록 <span style="font-size:12px;color:#999;font-family:'Noto Sans KR'">(교사)</span></span>
    <div class="nav-user">
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </nav>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('t','submissions')">제출물·피드백</button>
    <button class="tab-btn" onclick="switchTab('t','students')">학생 관리</button>
    <button class="tab-btn" onclick="switchTab('t','assignments')">과제 관리</button>
  </div>

  <!-- 제출물·피드백 탭 -->
  <div id="t-tab-submissions" class="container">
    <div class="filter-bar">
      <div class="form-group">
        <label>과제 필터</label>
        <select id="t-filter-assignment" onchange="loadAllSubmissions()">
          <option value="">전체 과제</option>
        </select>
      </div>
      <div class="form-group">
        <label>학생 필터</label>
        <select id="t-filter-student" onchange="loadAllSubmissions()">
          <option value="">전체 학생</option>
        </select>
      </div>
      <button class="btn-primary btn-sm" onclick="loadAllSubmissions()">조회</button>
    </div>
    <div id="all-submissions-list">
      <div class="empty-state"><div class="icon">📋</div><p>위 필터로 조회하세요</p></div>
    </div>
  </div>

  <!-- 학생 관리 탭 -->
  <div id="t-tab-students" class="container hidden">
    <div class="section-header">
      <h2>학생 목록</h2>
      <button class="btn-primary btn-sm" onclick="showAddStudentForm()">+ 학생 추가</button>
    </div>

    <!-- 학생 추가 폼 -->
    <div class="submit-form hidden" id="add-student-form">
      <h3>학생 추가</h3>
      <div class="form-row">
        <div class="form-group">
          <label>이름 *</label>
          <input type="text" id="new-s-name" placeholder="홍길동">
        </div>
        <div class="form-group">
          <label>반 *</label>
          <input type="text" id="new-s-class" placeholder="1반">
        </div>
        <div class="form-group">
          <label>번호</label>
          <input type="number" id="new-s-number" placeholder="1">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-outline" onclick="hideAddStudentForm()">취소</button>
        <button class="btn-primary" onclick="addStudent()">추가</button>
      </div>
    </div>

    <!-- 반 일괄 추가 폼 -->
    <div class="submit-form" id="bulk-student-form">
      <h3>반 일괄 추가</h3>
      <div class="form-group">
        <label>반 이름</label>
        <input type="text" id="bulk-class" placeholder="예: 1반">
      </div>
      <div class="form-group">
        <label>학생 이름 (한 줄에 한 명)</label>
        <textarea id="bulk-names" placeholder="홍길동&#10;김철수&#10;이영희" style="min-height:120px"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-primary" onclick="bulkAddStudents()">일괄 추가</button>
      </div>
    </div>

    <div class="card student-table-wrap" id="student-table-wrap">
      <table id="student-table">
        <thead><tr><th>코드</th><th>이름</th><th>반</th><th>번호</th></tr></thead>
        <tbody id="student-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- 과제 관리 탭 -->
  <div id="t-tab-assignments" class="container hidden">
    <div class="section-header">
      <h2>과제 목록</h2>
    </div>
    <div class="submit-form" id="add-assignment-form">
      <h3>새 과제 등록</h3>
      <div class="form-group">
        <label>과제명 *</label>
        <input type="text" id="new-a-title" placeholder="예: 1차시 활동지">
      </div>
      <div class="form-group">
        <label>설명</label>
        <textarea id="new-a-desc" placeholder="과제 안내 내용" style="min-height:70px"></textarea>
      </div>
      <div class="form-group">
        <label>마감일</label>
        <input type="date" id="new-a-due">
      </div>
      <div class="form-actions">
        <button class="btn-primary" onclick="addAssignment()">등록</button>
      </div>
    </div>

    <div id="t-assignment-list">
      <div class="empty-state"><div class="icon">📋</div><p>불러오는 중...</p></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// 설정
// ══════════════════════════════════════
const API = "https://script.google.com/macros/s/AKfycbwCxWzPvhtLvcbwLS-vE4VO8aBJkMVRTADSMrEoCfgxrdpgZ1TtQ7ixAZ7s5Y4FFyf1/exec";

let currentStudent = null;
let teacherPw = null;
let allAssignments = [];
let allStudents = [];
let selectedAssignmentId = null;

// ── API 호출 ──────────────────────────
async function api(params) {
  const qs = Object.entries(params)
    .map(([k,v]) => k + "=" + encodeURIComponent(v))
    .join("&");
  const res = await fetch(API + "?" + qs);
  return res.json();
}

// ── 로딩 ─────────────────────────────
function showLoading(msg="불러오는 중...") {
  document.getElementById("loading-text").textContent = msg;
  document.getElementById("loading").classList.remove("hidden");
}
function hideLoading() {
  document.getElementById("loading").classList.add("hidden");
}

// ── 토스트 ────────────────────────────
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2800);
}

// ── 페이지 전환 ───────────────────────
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ── 탭 전환 ──────────────────────────
function switchTab(prefix, tab) {
  const tabBtns = document.querySelectorAll(`#page-${prefix === 's' ? 'student' : 'teacher'} .tab-btn`);
  tabBtns.forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  document.querySelectorAll(`[id^="${prefix}-tab-"]`).forEach(el => el.classList.add("hidden"));
  document.getElementById(`${prefix}-tab-${tab}`).classList.remove("hidden");

  if (prefix === 's' && tab === 'my') loadMySubmissions();
  if (prefix === 't' && tab === 'submissions') { loadTeacherFilters(); loadAllSubmissions(); }
  if (prefix === 't' && tab === 'students') loadStudents();
  if (prefix === 't' && tab === 'assignments') loadTeacherAssignments();
}

// ══════════════════════════════════════
// 로그인
// ══════════════════════════════════════
async function loginStudent() {
  const code = document.getElementById("student-code").value.trim();
  if (!code || code.length < 6) { toast("6자리 코드를 입력해주세요."); return; }
  showLoading("확인 중...");
  try {
    const res = await api({ action: "login", code });
    if (res.success) {
      currentStudent = res.student;
      document.getElementById("s-name").textContent = res.student.name;
      document.getElementById("s-class").textContent = res.student.class + " " + (res.student.number ? res.student.number + "번" : "");
      showPage("page-student");
      loadStudentAssignments();
    } else {
      toast("❌ " + res.message);
    }
  } catch(e) { toast("연결 오류가 발생했습니다."); }
  hideLoading();
}

async function loginTeacher() {
  const pw = document.getElementById("teacher-pw").value;
  if (!pw) { toast("비밀번호를 입력해주세요."); return; }
  showLoading("확인 중...");
  try {
    const res = await api({ action: "teacherLogin", password: pw });
    if (res.success) {
      teacherPw = pw;
      showPage("page-teacher");
      loadTeacherFilters();
      loadAllSubmissions();
    } else {
      toast("❌ " + res.message);
    }
  } catch(e) { toast("연결 오류가 발생했습니다."); }
  hideLoading();
}

function logout() {
  currentStudent = null; teacherPw = null;
  document.getElementById("student-code").value = "";
  document.getElementById("teacher-pw").value = "";
  showPage("page-login");
}

// ══════════════════════════════════════
// 학생: 과제 목록
// ══════════════════════════════════════
async function loadStudentAssignments() {
  showLoading();
  const res = await api({ action: "getAssignments" });
  hideLoading();
  allAssignments = res.assignments || [];
  const el = document.getElementById("assignment-list");
  if (!allAssignments.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>등록된 과제가 없습니다.</p></div>`;
    return;
  }
  el.innerHTML = allAssignments.map((a, i) => `
    <div class="assignment-card" id="ac-${a.id}" onclick="selectAssignment('${a.id}')">
      <div class="a-num">${i+1}</div>
      <div class="a-info">
        <div class="a-title">${a.title}</div>
        ${a.description ? `<div class="a-desc">${a.description}</div>` : ''}
        ${a.due_date ? `<div class="a-due">마감: ${a.due_date}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function selectAssignment(id) {
  selectedAssignmentId = id;
  document.querySelectorAll(".assignment-card").forEach(c => c.classList.remove("selected"));
  document.getElementById("ac-"+id).classList.add("selected");
  const a = allAssignments.find(x => x.id === id);
  document.getElementById("submit-form-title").textContent = `📝 ${a.title} 제출`;
  document.getElementById("submit-form").classList.remove("hidden");
  document.getElementById("sub-content").value = "";
  document.getElementById("sub-file").value = "";
  document.getElementById("submit-form").scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function cancelSubmit() {
  selectedAssignmentId = null;
  document.querySelectorAll(".assignment-card").forEach(c => c.classList.remove("selected"));
  document.getElementById("submit-form").classList.add("hidden");
}

async function submitAssignment() {
  if (!selectedAssignmentId) { toast("과제를 선택해주세요."); return; }
  const content = document.getElementById("sub-content").value.trim();
  if (!content) { toast("내용을 입력해주세요."); return; }
  const file = document.getElementById("sub-file").value.trim();
  showLoading("제출 중...");
  try {
    const res = await api({
      action: "submitAssignment",
      student_code: currentStudent.code,
      assignment_id: selectedAssignmentId,
      content, file_url: file
    });
    if (res.success) {
      toast("✅ 제출 완료!");
      cancelSubmit();
    } else { toast("❌ " + res.message); }
  } catch(e) { toast("오류가 발생했습니다."); }
  hideLoading();
}

// ══════════════════════════════════════
// 학생: 내 제출물
// ══════════════════════════════════════
async function loadMySubmissions() {
  showLoading();
  const [subRes, aRes] = await Promise.all([
    api({ action: "getMySubmissions", student_code: currentStudent.code }),
    api({ action: "getAssignments" })
  ]);
  hideLoading();
  const assignMap = {};
  (aRes.assignments||[]).forEach(a => assignMap[a.id] = a.title);
  const list = subRes.submissions || [];
  const el = document.getElementById("my-submissions-list");
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📝</div><p>아직 제출한 과제가 없어요.</p></div>`;
    return;
  }
  list.sort((a,b) => b.submitted_at.localeCompare(a.submitted_at));
  el.innerHTML = list.map(s => `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${assignMap[s.assignment_id] || s.assignment_id}</div>
          <div class="card-meta">제출: ${s.submitted_at}</div>
        </div>
        ${s.feedback ? '<span class="chip">피드백 있음</span>' : '<span class="chip gray">피드백 대기</span>'}
      </div>
      <div class="card-body">${escHtml(s.content)}</div>
      ${s.file_url ? `<div style="margin-top:10px"><a href="${s.file_url}" target="_blank" style="font-size:13px;color:var(--primary)">📎 첨부 파일 보기</a></div>` : ''}
      ${s.feedback
        ? `<div class="feedback-box">
            <div class="fb-label">✏️ 선생님 피드백 <span style="font-weight:400;color:#c9a33e">${s.feedback.created_at}</span></div>
            <div class="fb-content">${escHtml(s.feedback.content)}</div>
           </div>`
        : `<div class="no-feedback">아직 피드백이 없습니다.</div>`
      }
    </div>
  `).join('');
}

// ══════════════════════════════════════
// 교사: 필터 로드
// ══════════════════════════════════════
async function loadTeacherFilters() {
  const [aRes, sRes] = await Promise.all([
    api({ action: "getAssignments" }),
    api({ action: "getStudents", password: teacherPw })
  ]);
  allAssignments = aRes.assignments || [];
  allStudents = sRes.students || [];

  const aFilter = document.getElementById("t-filter-assignment");
  aFilter.innerHTML = '<option value="">전체 과제</option>' +
    allAssignments.map(a => `<option value="${a.id}">${a.title}</option>`).join('');

  const sFilter = document.getElementById("t-filter-student");
  const byClass = {};
  allStudents.forEach(s => { (byClass[s.class] = byClass[s.class]||[]).push(s); });
  sFilter.innerHTML = '<option value="">전체 학생</option>' +
    Object.entries(byClass).map(([cls, sts]) =>
      `<optgroup label="${cls}">${sts.map(s => `<option value="${s.code}">${s.name} (${s.class} ${s.number}번)</option>`).join('')}</optgroup>`
    ).join('');
}

// ══════════════════════════════════════
// 교사: 제출물 조회
// ══════════════════════════════════════
async function loadAllSubmissions() {
  const assignId = document.getElementById("t-filter-assignment")?.value || "";
  const studentCode = document.getElementById("t-filter-student")?.value || "";
  showLoading();
  const res = await api({
    action: "getAllSubmissions", password: teacherPw,
    assignment_id: assignId, student_code: studentCode
  });
  hideLoading();
  const list = res.submissions || [];
  const assignMap = {}; allAssignments.forEach(a => assignMap[a.id] = a.title);
  const studentMap = {}; allStudents.forEach(s => studentMap[s.code] = s);

  const el = document.getElementById("all-submissions-list");
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>제출물이 없습니다.</p></div>`;
    return;
  }
  list.sort((a,b) => b.submitted_at.localeCompare(a.submitted_at));
  el.innerHTML = list.map(s => {
    const st = studentMap[s.student_code] || { name: s.student_code, class: "", number: "" };
    return `
    <div class="sub-card">
      <div class="sub-card-header">
        <div>
          <div class="sub-student">${st.name} <span style="font-weight:400;font-size:13px;color:var(--text3)">${st.class} ${st.number ? st.number+'번' : ''}</span></div>
          <div class="sub-meta">과제: ${assignMap[s.assignment_id]||s.assignment_id} · 제출: ${s.submitted_at}</div>
        </div>
        ${s.feedback ? '<span class="chip">피드백 완료</span>' : '<span class="chip orange">미완료</span>'}
      </div>
      <div class="sub-content">${escHtml(s.content)}</div>
      ${s.file_url ? `<div style="margin-bottom:12px"><a href="${s.file_url}" target="_blank" style="font-size:13px;color:var(--primary)">📎 첨부 파일 보기</a></div>` : ''}

      ${s.feedback
        ? `<div class="feedback-saved" id="fb-view-${s.id}">${escHtml(s.feedback.content)}</div>`
        : ''
      }
      <div class="feedback-input-area">
        <label style="margin-bottom:6px">${s.feedback ? '피드백 수정' : '피드백 작성'}</label>
        <textarea id="fb-${s.id}" placeholder="학생에게 전달할 피드백을 입력하세요.">${s.feedback ? s.feedback.content : ''}</textarea>
        <div style="display:flex;justify-content:flex-end;margin-top:8px">
          <button class="btn-primary btn-sm" onclick="saveFeedback('${s.id}','${s.student_code}','${s.assignment_id}')">
            ${s.feedback ? '수정 저장' : '피드백 저장'}
          </button>
        </div>
      </div>
    </div>
  `}).join('');
}

async function saveFeedback(subId, studentCode, assignmentId) {
  const content = document.getElementById("fb-"+subId)?.value.trim();
  if (!content) { toast("피드백 내용을 입력해주세요."); return; }
  showLoading("저장 중...");
  const res = await api({
    action: "submitFeedback", password: teacherPw,
    submission_id: subId, student_code: studentCode,
    assignment_id: assignmentId, content
  });
  hideLoading();
  if (res.success) { toast("✅ 피드백이 저장되었습니다."); loadAllSubmissions(); }
  else toast("❌ " + res.message);
}

// ══════════════════════════════════════
// 교사: 학생 관리
// ══════════════════════════════════════
async function loadStudents() {
  showLoading();
  const res = await api({ action: "getStudents", password: teacherPw });
  hideLoading();
  allStudents = res.students || [];
  const tbody = document.getElementById("student-tbody");
  if (!allStudents.length) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:30px">등록된 학생이 없습니다.</td></tr>`;
    return;
  }
  const sorted = [...allStudents].sort((a,b) => a.class.localeCompare(b.class) || (a.number-b.number));
  tbody.innerHTML = sorted.map(s => `
    <tr>
      <td><span class="code-badge">${s.code}</span></td>
      <td>${s.name}</td>
      <td>${s.class}</td>
      <td>${s.number}</td>
    </tr>
  `).join('');
}

function showAddStudentForm() { document.getElementById("add-student-form").classList.remove("hidden"); }
function hideAddStudentForm() { document.getElementById("add-student-form").classList.add("hidden"); }

async function addStudent() {
  const name = document.getElementById("new-s-name").value.trim();
  const cls = document.getElementById("new-s-class").value.trim();
  const num = document.getElementById("new-s-number").value.trim();
  if (!name || !cls) { toast("이름과 반을 입력해주세요."); return; }
  showLoading("추가 중...");
  const res = await api({ action: "addStudent", password: teacherPw, name, class_name: cls, number: num });
  hideLoading();
  if (res.success) {
    toast(`✅ ${name} 추가 완료! 코드: ${res.code}`);
    hideAddStudentForm();
    loadStudents();
  } else toast("❌ " + res.message);
}

async function bulkAddStudents() {
  const cls = document.getElementById("bulk-class").value.trim();
  const names = document.getElementById("bulk-names").value.trim().split("\n").map(n=>n.trim()).filter(Boolean);
  if (!cls || !names.length) { toast("반 이름과 학생 이름을 입력해주세요."); return; }
  showLoading(`0/${names.length} 추가 중...`);
  let ok = 0;
  for (let i = 0; i < names.length; i++) {
    document.getElementById("loading-text").textContent = `${i+1}/${names.length} 추가 중...`;
    const res = await api({ action: "addStudent", password: teacherPw, name: names[i], class_name: cls, number: i+1 });
    if (res.success) ok++;
    await new Promise(r => setTimeout(r, 300));
  }
  hideLoading();
  toast(`✅ ${ok}명 추가 완료!`);
  document.getElementById("bulk-class").value = "";
  document.getElementById("bulk-names").value = "";
  loadStudents();
}

// ══════════════════════════════════════
// 교사: 과제 관리
// ══════════════════════════════════════
async function loadTeacherAssignments() {
  showLoading();
  const res = await api({ action: "getAssignments" });
  hideLoading();
  const list = res.assignments || [];
  const el = document.getElementById("t-assignment-list");
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>등록된 과제가 없습니다.</p></div>`;
    return;
  }
  el.innerHTML = list.map((a,i) => `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${a.title}</div>
          <div class="card-meta">ID: ${a.id} · 등록: ${a.created_at}${a.due_date ? ' · 마감: '+a.due_date : ''}</div>
        </div>
        <span class="chip">#${i+1}</span>
      </div>
      ${a.description ? `<div class="card-body">${escHtml(a.description)}</div>` : ''}
    </div>
  `).join('');
}

async function addAssignment() {
  const title = document.getElementById("new-a-title").value.trim();
  const desc = document.getElementById("new-a-desc").value.trim();
  const due = document.getElementById("new-a-due").value;
  if (!title) { toast("과제명을 입력해주세요."); return; }
  showLoading("등록 중...");
  const res = await api({ action: "addAssignment", password: teacherPw, title, description: desc, due_date: due });
  hideLoading();
  if (res.success) {
    toast("✅ 과제가 등록되었습니다.");
    document.getElementById("new-a-title").value = "";
    document.getElementById("new-a-desc").value = "";
    document.getElementById("new-a-due").value = "";
    loadTeacherAssignments();
    loadTeacherFilters();
  } else toast("❌ " + res.message);
}

// ── 유틸 ──────────────────────────────
function escHtml(str) {
  return String(str||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
</script>
</body>
</html>
